name: release-finish

# Merges a release branch into both main and develop, tags main, deletes the
# release branch. Triggered when CI passes on a release/* branch, or manually.
#
# Claude workflow: after release-cut + CI green, this fires automatically.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - "release/**"
  workflow_dispatch:
    inputs:
      branch:
        description: "Release branch to finish (e.g. release/0.3.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  finish:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release branch name
        id: branch
        env:
          DISPATCH_BRANCH: ${{ inputs.branch }}
          RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ -n "$DISPATCH_BRANCH" ]; then
            echo "name=$DISPATCH_BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "name=$RUN_BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from branch name
        id: ver
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          VERSION=$(echo "$BRANCH" | sed 's|release/||')
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: could not parse version from branch '$BRANCH'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin

      - name: Merge release → main
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git checkout main
          git merge --no-ff "origin/${BRANCH}" \
            -m "merge(gitflow): ${BRANCH} → main"
          git push origin main

      - name: Tag release on main
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Merge release → develop
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git checkout develop
          git merge --no-ff "origin/${BRANCH}" \
            -m "merge(gitflow): ${BRANCH} → develop (v${VERSION})"
          git push origin develop

      - name: Delete release branch
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: git push origin --delete "$BRANCH"
